{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<div class="section">
    <h2>{% trans "Définir un nouveau mot de passe" %}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">{% trans "Changer mon mot de passe" %}</button>
    </form>
</div>
{% endblock %}
